<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="_jILQK5_oNjz5aSJQ0YR_jq_bmepo3OEU8Vs6Y0pZgY" />
   
    <style>
        @font-face {
            font-family: 'KrutiDev10';
            src: url('https://cdn.jsdelivr.net/gh/Shreeshail/Kruti-Dev-10-Webfont/KrutiDev10.woff2') format('woff2');
        }
        :root { --primary: #0ea5e9; --bg: #add8e6; --card: #ffffff; --correct: #22c55e; --wrong: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 95%; max-width: 850px; border: 2px solid #ee5011; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .config-bar { display: flex; justify-content: space-between; background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; align-items: center; }
        #text-display { font-size: 1.8rem; line-height: 2.8rem; height: 120px; background: #0f172a; color: #cbd5e1; padding: 20px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .hindi-font { font-family: 'KrutiDev10' !important; font-size: 2.2rem !important; }
        .current-char { border-bottom: 3px solid var(--primary); background: #334155; }
        .correct { color: var(--correct); }
        .wrong { color: var(--wrong); background: rgba(239, 68, 68, 0.3); }
        #input-field { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1.4rem; box-sizing: border-box; }
        .stats-row { display: flex; gap: 10px; margin-top: 20px; }
        .stat-card { flex: 1; background: #0f172a; color: white; padding: 10px; border-radius: 8px; text-align: center; }
        .btn-reset { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        .ad-container { margin-top: 25px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary); margin:0;">TYPING MASTER PRO</h1>
        <pre style="color: darkred; font-weight: bold;">WORLD WIDE EDUCATION CENTRE | DEV: OM YADAV</pre>
    </header>

    <div class="config-bar">
        <div>FONT: <select id="lang" onchange="resetTest()"><option value="en">English</option><option value="hi">Hindi (KrutiDev 10)</option></select></div>
        <div>TIME: <input type="number" id="time" value="1" style="width:40px;"> MIN</div>
        <div id="timer">LEFT: 60s</div>
    </div>

    <div id="text-display">Click 'Start Test' to load words...</div>
    <input type="text" id="input-field" placeholder="Pehle niche button dabayein..." disabled>

    <div class="stats-row">
        <div class="stat-card">WPM<br><strong id="wpm">0</strong></div>
        <div class="stat-card">Accuracy<br><strong id="acc">100</strong>%</div>
        <div class="stat-card">Mistakes<br><strong id="err">0</strong></div>
    </div>

    <button id="main-btn" class="btn-reset" onclick="startTest()">Start Test</button>

    <div class="ad-container">
        <iframe style="width:468px; height:60px; border:none;" sandbox="allow-scripts allow-same-origin" srcdoc="<body style='margin:0; display:flex; justify-content:center;'><script>atOptions={'key':'3e54154489ac49775971265d6617c0be','format':'iframe','height':60,'width':468,'params':{}};</script><script src='https://www.highperformanceformat.com/3e54154489ac49775971265d6617c0be/invoke.js'></script></body>"></iframe>
    </div>
</div>

<script>
    const display = document.getElementById('text-display');
    const input = document.getElementById('input-field');
    const langSelect = document.getElementById('lang');
    
    const enTexts = ["om yadav is a bca student at world wide education centre", "practice makes a man perfect keep typing every day", "computer education is very important for every student"];
    const hiTexts = ["vke ;kno oYMZ okbM t_twds_ku lsaVj dk Nk_ gSA", "vH;kl djus ls gh vkidh L_hM c_sxhA", "fgUnh Vkbi_ax djuk cgqr gh vklku gSA"];

    let timer, timeLeft, isPlaying = false, charIndex = 0, mistakes = 0, totalTyped = 0;

    function startTest() {
        resetTest();
        input.disabled = false;
        input.placeholder = "Type karna shuru karein...";
        input.focus();
        loadNewText();
    }

    function loadNewText() {
        const isHi = langSelect.value === 'hi';
        const texts = isHi ? hiTexts : enTexts;
        const text = texts[Math.floor(Math.random() * texts.length)];
        
        display.innerHTML = "";
        display.className = isHi ? "hindi-font" : "";
        input.className = isHi ? "hindi-font" : "";

        text.split("").forEach(char => {
            let span = document.createElement('span');
            span.innerText = char;
            display.appendChild(span);
        });
        display.querySelectorAll('span')[0].classList.add('current-char');
    }

    function resetTest() {
        clearInterval(timer);
        isPlaying = false; charIndex = 0; mistakes = 0; totalTyped = 0;
        input.value = ""; 
        document.getElementById('wpm').innerText = "0";
        document.getElementById('acc').innerText = "100";
        document.getElementById('err').innerText = "0";
        document.getElementById('timer').innerText = "LEFT: " + (document.getElementById('time').value * 60) + "s";
    }

    input.addEventListener('input', (e) => {
        const spans = display.querySelectorAll('span');
        let typed = e.target.value.split("")[charIndex];

        if (!isPlaying) {
            isPlaying = true;
            timeLeft = document.getElementById('time').value * 60;
            timer = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = "LEFT: " + timeLeft + "s";
                    let wpm = Math.round(((totalTyped - mistakes) / 5) / ((document.getElementById('time').value * 60 - timeLeft) / 60));
                    document.getElementById('wpm').innerText = wpm > 0 ? wpm : 0;
                } else { clearInterval(timer); input.disabled = true; alert("Time Up!"); }
            }, 1000);
        }

        if (typed == null) {
            if (charIndex > 0) { charIndex--; spans[charIndex].classList.remove('correct', 'wrong'); }
        } else {
            if (spans[charIndex].innerText === typed) { spans[charIndex].classList.add('correct'); }
            else { mistakes++; spans[charIndex].classList.add('wrong'); }
            charIndex++; totalTyped++;
        }

        document.getElementById('err').innerText = mistakes;
        document.getElementById('acc').innerText = totalTyped > 0 ? Math.round(((totalTyped - mistakes) / totalTyped) * 100) : 100;

        spans.forEach(s => s.classList.remove('current-char'));
        if(spans[charIndex]) spans[charIndex].classList.add('current-char');
        else { input.value = ""; charIndex = 0; loadNewText(); }
    });
</script>
</body>
</html>
