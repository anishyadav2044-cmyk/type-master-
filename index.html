<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="_jILQK5_oNjz5aSJQ0YR_jq_bmepo3OEU8Vs6Y0pZgY" />
    <title>Om Yadav - Typing Master Pro</title>
    
    <style>
        /* Force Loading KrutiDev from multiple sources */
        @font-face {
            font-family: 'KrutiDev10';
            src: url('https://cdn.jsdelivr.net/gh/Shreeshail/Kruti-Dev-10-Webfont/KrutiDev10.woff2') format('woff2');
            font-weight: normal; font-style: normal; font-display: block;
        }

        :root { --primary: #0ea5e9; --bg: #add8e6; --card: #ffffff; --correct: #22c55e; --wrong: #ef4444; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 95%; max-width: 850px; border: 2px solid #ee5011; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #text-display { font-size: 2rem; line-height: 3rem; height: 140px; background: #0f172a; color: #cbd5e1; padding: 20px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        
        /* Ye class Hindi ko force karegi */
        .hindi-font { 
            font-family: 'KrutiDev10', 'Arial' !important; 
            font-size: 2.8rem !important; 
            letter-spacing: 1px;
        }

        .correct { color: var(--correct); }
        .wrong { color: var(--wrong); background: rgba(239, 68, 68, 0.3); }
        #input-field { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1.5rem; }
        .btn-reset { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary); margin:0;">TYPING MASTER PRO</h1>
        <pre style="color: darkred; font-weight: bold;">WORLD WIDE EDUCATION CENTRE | DEV: OM YADAV</pre>
    </header>

    <div style="background: #0f172a; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div>FONT: <select id="lang" onchange="startTest()"><option value="en">English</option><option value="hi" selected>Hindi (KrutiDev)</option></select></div>
        <div id="timer">TIME: 60s</div>
    </div>

    <div id="text-display" class="hindi-font">Loading...</div>
    <input type="text" id="input-field" placeholder="Start typing here...">

    <div style="display: flex; gap: 10px; margin-top: 20px; text-align: center; color: white;">
        <div style="flex:1; background:#0f172a; padding:10px; border-radius:8px;">WPM: <strong id="wpm">0</strong></div>
        <div style="flex:1; background:#0f172a; padding:10px; border-radius:8px;">Mistakes: <strong id="err">0</strong></div>
    </div>

    <button class="btn-reset" onclick="startTest()">Restart / Start Test</button>
</div>

<script>
    const display = document.getElementById('text-display');
    const input = document.getElementById('input-field');
    const langSelect = document.getElementById('lang');
    
    const hiTexts = ["vke ;kno oYMZ okbM t_twds_ku lsaVj dk Nk_ gSA", "vH;kl djus ls gh vkidh L_hM c_sxhA"];
    const enTexts = ["Practice makes a man perfect.", "Typing is a great skill to learn."];

    let charIndex = 0, mistakes = 0;

    function startTest() {
        charIndex = 0; mistakes = 0; input.value = "";
        const isHi = langSelect.value === 'hi';
        const text = isHi ? hiTexts[Math.floor(Math.random()*hiTexts.length)] : enTexts[0];
        
        display.className = isHi ? "hindi-font" : "";
        input.className = isHi ? "hindi-font" : "";
        
        display.innerHTML = "";
        text.split("").forEach(char => {
            let span = document.createElement('span');
            span.innerText = char;
            display.appendChild(span);
        });
    }

    input.addEventListener('input', () => {
        const spans = display.querySelectorAll('span');
        const typedChars = input.value.split("");
        
        spans.forEach((span, index) => {
            if (typedChars[index] == null) {
                span.classList.remove('correct', 'wrong');
            } else if (typedChars[index] === span.innerText) {
                span.classList.add('correct');
                span.classList.remove('wrong');
            } else {
                span.classList.add('wrong');
                span.classList.remove('correct');
            }
        });
        document.getElementById('err').innerText = display.querySelectorAll('.wrong').length;
    });

    startTest();
</script>
</body>
</html>
