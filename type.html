<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Kruti Dev Typing Pro Master</title>
    <style>
        :root {
            --primary: #6c5ce7; 
            --secondary: #a29bfe;
            --success: #00b894;
            --error: #d63031;
            --bg: #f8f9fa;
            --text-main: #2d3436;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container {
            background: white; 
            padding: 40px; 
            border-radius: 20px;
            width: 95%;
            max-width: 900px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .kruti {
            font-family: 'Kruti Dev 010', 'Kruti Dev 011', sans-serif !important;
            font-weight: 700 !important;
        }

        #text-display {
            background: #ffffff;
            color: #4834d4; 
            font-size: 36px; 
            padding: 30px;
            border-radius: 15px;
            text-align: left;
            height: 160px; 
            overflow-y: auto; 
            margin-bottom: 25px;
            border: 3px solid #eeeefd;
            line-height: 1.8;
            letter-spacing: 1px;
            user-select: none;
            box-shadow: inset 0 2px 15px rgba(108, 92, 231, 0.05);
        }

        #typing-input {
            width: 100%; 
            height: 130px;
            font-size: 30px; 
            padding: 20px; 
            border-radius: 12px;
            border: 2px solid #dcdde1; 
            outline: none; 
            box-sizing: border-box;
            color: #2d3436;
            transition: all 0.3s ease;
            margin-bottom: 20px; /* Thodi space niche ke liye */
        }

        #typing-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.15);
        }

        .stats-row {
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #f1f2f6; 
            padding: 15px; 
            border-radius: 12px;
            font-weight: 800; 
            font-size: 22px; 
            flex: 1;
            min-width: 100px;
            color: var(--primary);
        }

        .stat-label {
            display: block;
            font-size: 11px;
            color: #636e72;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        button {
            padding: 12px 35px; 
            background: var(--primary); 
            color: white;
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #4834d4;
            transform: scale(1.05);
        }

        /* NATIVE AD CONTAINER - SABSE NICHE */
        .native-ad-wrapper {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            width: 100%;
            overflow: hidden;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .correct { color: var(--success) !important; }
        .wrong { 
            background: #ffeaa7; 
            color: var(--error) !important; 
            border-bottom: 3px solid var(--error);
        }

        #text-display::-webkit-scrollbar { width: 6px; }
        #text-display::-webkit-scrollbar-thumb { background: #dcdde1; border-radius: 10px; }
    </style>
</head>
<body>
    <script src="https://pl29028606.profitablecpmratenetwork.com/9d/4d/a8/9d4da8e79a7c745e06abcb25f47f37b3.js"></script>

<div class="container">
    <h2 style="color:var(--primary); margin-top:0;">⌨️ KRUTI DEV TYPING MASTER</h2>
    
    <div class="stats-row">
        <div class="stat-box">
            <span class="stat-label">Timer</span>
            <span id="timer">60</span>s
        </div>
        <div class="stat-box">
            <span class="stat-label">Speed (WPM)</span>
            <span id="wpm">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Accuracy</span>
            <span id="acc">100</span>%
        </div>
        <div style="display:flex; align-items:center; gap:10px; flex: 1; justify-content: center;">
            <select id="time-select" style="padding:10px; border-radius:8px; border: 1px solid #ccc;">
                <option value="60">1 Minat</option>
                <option value="120">2 Minat</option>
            </select>
            <button id="restart-btn">Reset</button>
        </div>
    </div>

    <div id="text-display" class="kruti"></div>
    <textarea id="typing-input" class="kruti" placeholder="Yahan se type karna start karein..."></textarea>

    <div class="native-ad-wrapper">
        <script async="async" data-cfasync="false" src="https://pl28974119.profitablecpmratenetwork.com/b378a429878ac12e0314d0a41bfc28e1/invoke.js"></script>
        <div id="container-b378a429878ac12e0314d0a41bfc28e1"></div>
    </div>
</div>

<script>
    const hindiParagraphs = [
        "vki lHkh dk bl typing test esa Lokxr gSA Hkkjr ,d egku ns'k gSA bldh laL—fr vkSj lEiznk fo'o Hkj esa izfl) gSA",
        "Hkkjr ,d egku ns'k gS bldh fojklr cgqr iqjkuh gSA yksx fey-tqydj jgrs gSa vkSj fofHkUu R;ksgkjksa dks mRlkg ds lkFk eukrs gSaA",
        "esgur gh lQyrk dh dqatkh gS dksf'k\"k djrs jgsaA f'k{kk ds {ks= esa rduhdh Kku dk gksuk vko';d gSA",
        "le; cgqr dherh gS bls cckZn u djsaA deZ gh iwtk gS vkSj lPph yxu ls fd;k x;k dk;Z ges'kk lQyrk fnykrk gSA",
        "vkt dk dke dy ij er NksM+ksA le; dk lhiw;ksx djsaA vktdy ds ;qx esa dEI;wVj dk Kku gksuk cgqr t:jh gSA"
    ];

    let timerInterval = null, timeLeft, isRunning = false, currentTarget = "", startTime;
    const display = document.getElementById('text-display'), input = document.getElementById('typing-input');
    const timerText = document.getElementById('timer'), wpmText = document.getElementById('wpm');
    const accText = document.getElementById('acc'), restartBtn = document.getElementById('restart-btn');
    const timeSelect = document.getElementById('time-select');

    function initTest() {
        clearInterval(timerInterval);
        isRunning = false;
        timeLeft = parseInt(timeSelect.value);
        timerText.innerText = timeLeft;
        input.value = ""; input.disabled = false;
        wpmText.innerText = "0"; accText.innerText = "100";
        currentTarget = hindiParagraphs[Math.floor(Math.random() * hindiParagraphs.length)];
        display.innerHTML = currentTarget.split('').map(char => `<span>${char}</span>`).join('');
        display.scrollTop = 0;
    }

    function startTimer() {
        startTime = new Date();
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerText.innerText = timeLeft;
                let timeElapsed = (new Date() - startTime) / 60000;
                wpmText.innerText = Math.round((input.value.length / 5) / timeElapsed) || 0;
            } else {
                clearInterval(timerInterval);
                input.disabled = true;
                alert("Game Over! Speed: " + wpmText.innerText + " WPM");
            }
        }, 1000);
    }

    input.addEventListener('input', () => {
        if (!isRunning && input.value.length > 0) { isRunning = true; startTimer(); }
        const typed = input.value.split(''), spans = display.querySelectorAll('span');
        let errs = 0;
        spans.forEach((span, i) => {
            if (typed[i] == null) span.className = "";
            else if (typed[i] === span.innerText) span.className = "correct";
            else { span.className = "wrong"; errs++; }
        });
        if (typed.length > 0) accText.innerText = Math.round(((typed.length - errs) / typed.length) * 100);
        if (typed.length >= currentTarget.length) {
            input.value = "";
            currentTarget = hindiParagraphs[Math.floor(Math.random() * hindiParagraphs.length)];
            display.innerHTML = currentTarget.split('').map(char => `<span>${char}</span>`).join('');
        }
    });

    restartBtn.addEventListener('click', initTest);
    timeSelect.addEventListener('change', initTest);
    initTest();
</script>
</body>
</html>
